research_analysis_task:
  description: >
    Review the collected multi-source research for {app_name}. The target user is:
    {target_user}. The user problem is: {user_problem}. The dream outcome is:
    {dream_outcome}. The launch stage is: {launch_stage}. The CTA target is:
    {cta_target}. Use only the evidence below.

    Research summary:
    {research_summary}

    Pain point clusters:
    {pain_point_clusters}

    Competitor watchlist:
    {competitor_watchlist}

    Viral campaign examples:
    {viral_campaign_examples}

    Source digest:
    {source_digest}

    Produce a practical research brief for the current year {current_year}.
  expected_output: >
    A markdown brief with these sections: source-backed audience pains, competitor
    positioning patterns, viral campaign lessons, objections, content opportunities,
    and a ranked top 5 list of launch opportunities for this week.
  agent: research_agent

idea_generation_task:
  description: >
    Use the research brief to generate at least {batch_size} content ideas
    for {app_name}. The app one-liner is: {app_one_liner}. The core features are:
    {core_features}. The proof points are: {proof_points}. The content pillars are:
    {content_pillars}. Split the ideas across funnel stages:
    1. awareness
    2. consideration
    3. proof
    4. conversion
  expected_output: >
    A markdown backlog of at least {batch_size} ideas. Include a healthy mix of awareness,
    consideration, proof, and conversion ideas. For each idea include: funnel_stage,
    title, platform, hook, angle, audience takeaway, CTA target, and suggested asset type.
  agent: idea_agent

writing_task:
  description: >
    Turn the strongest ideas from the backlog into ready-to-edit faceless drafts for TikTok
    and Instagram. Draft at least {draft_batch_size} posts.
    Write in a {brand_voice} voice. Avoid generic startup hype. Make every draft
    tie back to the user problem, the promised outcome, or the launch action:
    {cta_target}.
  expected_output: >
    A markdown draft pack with at least {draft_batch_size} posts. For TikTok include hook,
    short talking script, on-screen text, and CTA. For Instagram include caption,
    reel or carousel angle, and CTA. Keep each draft concise and editable.
  agent: writing_agent

planning_task:
  description: >
    Organize the drafted content into a 1-week schedule for {app_name}.
    Focus on {platforms}. Balance the content pillars: {content_pillars}.
    Keep the schedule realistic for a faceless brand trying to build hype and drive
    users toward {cta_target} before launch. Select the best {posts_per_week} items
    from the larger draft batch and explain why they were chosen.
  expected_output: >
    A markdown weekly content calendar with 5 post slots. For each slot include:
    day, platform, funnel stage, content pillar, post concept, asset type,
    production note, publish note, CTA target, and a short reason this post made the cut.
  agent: planner_agent

media_planning_task:
  description: >
    Build a companion media pack for the scheduled content. Use the ideas, drafts,
    and weekly plan to specify reel support assets and designed Instagram post assets.
    Include static visual concepts that could be generated with an image tool.
  expected_output: >
    A markdown media pack with these sections:
    1. reel support assets
    2. carousel and static post design briefs
    3. cover-frame concepts
    4. image-generation prompts
    For each asset include: title, platform, asset type, visual goal, copy/text overlay,
    production notes, and image prompt when relevant.
  agent: media_agent
